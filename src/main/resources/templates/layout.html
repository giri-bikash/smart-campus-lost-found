<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Campus Lost &amp; Found</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #F0F4FF; min-height: 100vh; }

        /* ── Navbar ── */
        .navbar {
            background: #1A237E; padding: 0 32px;
            display: flex; align-items: center;
            justify-content: space-between; height: 60px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .navbar-brand {
            color: white; font-size: 18px;
            font-weight: bold; text-decoration: none;
        }
        .navbar-brand span { color: #90CAF9; }
        .navbar-links { display: flex; align-items: center; gap: 8px; }
        .navbar-links a {
            color: #BBDEFB; text-decoration: none;
            padding: 8px 14px; border-radius: 6px;
            font-size: 14px; transition: background 0.2s;
        }
        .navbar-links a:hover { background: rgba(255,255,255,0.15); color: white; }
        .navbar-links .btn-post {
            background: #0288D1; color: white;
            font-weight: bold; margin-left: 4px;
        }
        .navbar-links .btn-post:hover { background: #0277BD; }
        .navbar-user {
            color: #90CAF9; font-size: 13px;
            padding: 8px 14px; border-right: 1px solid rgba(255,255,255,0.2);
            margin-right: 4px;
        }
        .btn-logout {
            color: #FF8A80 !important;
        }
        .btn-logout:hover { background: rgba(255,100,100,0.15) !important; }

        /* ── Main content ── */
        .main-content { padding: 32px; max-width: 1100px; margin: 0 auto; }

        /* ── Cards ── */
        .card {
            background: white; border-radius: 12px;
            padding: 28px; box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 24px;
        }
        .card-title {
            font-size: 20px; font-weight: bold;
            color: #1A237E; margin-bottom: 16px;
        }

        /* ── Buttons ── */
        .btn {
            padding: 10px 20px; border: none; border-radius: 8px;
            font-size: 14px; font-weight: bold; cursor: pointer;
            text-decoration: none; display: inline-block;
        }
        .btn-primary { background: #1A237E; color: white; }
        .btn-primary:hover { background: #1565C0; }
        .btn-secondary { background: #E3F2FD; color: #1A237E; }
        .btn-secondary:hover { background: #BBDEFB; }
        .btn-danger { background: #FFEBEE; color: #C62828; }
        .btn-success { background: #E8F5E9; color: #2E7D32; }

        /* ── Alerts ── */
        .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
        .alert-success { background: #D1FAE5; color: #065F46; }
        .alert-error { background: #FEE2E2; color: #DC2626; }
        .alert-info { background: #DBEAFE; color: #1E40AF; }

        /* ── Forms ── */
        .form-group { margin-bottom: 18px; }
        .form-group label { display: block; font-size: 13px; font-weight: bold; color: #374151; margin-bottom: 6px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 10px 14px;
            border: 1px solid #D1D5DB; border-radius: 8px;
            font-size: 14px; font-family: Arial, sans-serif;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: #1565C0;
            box-shadow: 0 0 0 3px rgba(21,101,192,0.1);
        }
        .form-error { color: #DC2626; font-size: 12px; margin-top: 4px; }

        /* ── Status badges ── */
        .badge {
            display: inline-block; padding: 3px 10px; border-radius: 20px;
            font-size: 11px; font-weight: bold;
        }
        .badge-open { background: #DBEAFE; color: #1E40AF; }
        .badge-matched { background: #D1FAE5; color: #065F46; }
        .badge-claimed { background: #FEF3C7; color: #92400E; }
        .badge-resolved { background: #F3F4F6; color: #6B7280; }
        .badge-lost { background: #FEE2E2; color: #991B1B; }
        .badge-found { background: #D1FAE5; color: #065F46; }

        /* ── Grid ── */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) {
            .grid-2, .grid-3 { grid-template-columns: 1fr; }
            .main-content { padding: 16px; }
        }
    </style>
</head>
<body>

<nav class="navbar">
    <a th:href="@{/}" class="navbar-brand">Smart Campus <span>Lost &amp; Found</span></a>
    <div class="navbar-links">
        <a th:href="@{/items}">Browse Found Items</a>
        <sec:authorize access="isAuthenticated()">
            <a th:href="@{/items/lost/new}" class="btn-post">+ Report Lost</a>
            <a th:href="@{/items/found/new}" class="btn-post">+ Report Found</a>
            <a th:href="@{/dashboard}">Dashboard</a>
            <span class="navbar-user" sec:authentication="name"></span>
            <a th:href="@{/logout}" class="btn-logout">Logout</a>
        </sec:authorize>
        <sec:authorize access="!isAuthenticated()">
            <a th:href="@{/login}">Login</a>
            <a th:href="@{/register}" class="btn-post">Register</a>
        </sec:authorize>
    </div>
</nav>

<div class="main-content" th:fragment="content">
    <!-- Page content goes here -->
</div>

</body>
</html>
