<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Register – Smart Campus Lost & Found</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #F0F4FF; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: white; padding: 40px; border-radius: 12px; width: 420px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        h2 { color: #1A237E; text-align: center; margin-bottom: 8px; }
        p.sub { text-align: center; color: #666; margin-bottom: 24px; font-size: 14px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; font-weight: bold; color: #333; margin-bottom: 6px; }
        input { width: 100%; padding: 10px 14px; border: 1px solid #D1D5DB; border-radius: 8px; font-size: 14px; }
        input:focus { outline: none; border-color: #1565C0; }
        .error { color: #DC2626; font-size: 12px; margin-top: 4px; }
        .btn { width: 100%; padding: 12px; background: #1A237E; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; cursor: pointer; margin-top: 8px; }
        .btn:hover { background: #1565C0; }
        .alert-error { background: #FEE2E2; color: #DC2626; padding: 10px 14px; border-radius: 8px; margin-bottom: 16px; font-size: 13px; }
        .footer-link { text-align: center; margin-top: 20px; font-size: 13px; color: #666; }
        .footer-link a { color: #1565C0; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <h2>Create Account</h2>
    <p class="sub">Smart Campus Lost &amp; Found — BinaryBoys</p>

    <div th:if="${errorMsg}" class="alert-error" th:text="${errorMsg}"></div>

    <form th:action="@{/register}" th:object="${user}" method="post">
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" th:field="*{name}" placeholder="Bikash Giri"/>
            <span class="error" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></span>
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" th:field="*{email}" placeholder="you@sheridancollege.ca"/>
            <span class="error" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></span>
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" th:field="*{password}" placeholder="Min 6 characters"/>
            <span class="error" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></span>
        </div>
        <button type="submit" class="btn">Create Account</button>
    </form>

    <div class="footer-link">
        Already have an account? <a th:href="@{/login}">Sign in</a>
    </div>
</div>
</body>
</html>
